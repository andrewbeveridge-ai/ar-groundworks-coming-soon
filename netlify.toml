[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Apps Script source is versioned in /apps-script for safekeeping,
# but the live script runs in Google Apps Script — not served from the site.
[[redirects]]
  from = "/apps-script/*"
  to = "/"
  status = 404
  force = true
