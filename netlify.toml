[build]
  publish = "."
  # Auto cache-bust: stamp the deploy commit's short hash onto style.css / site.js
  # references in every HTML file at build time (no manual ?v= bumping).
  command = "bash scripts/stamp-version.sh"

# --- Old brand → new brand 301 (website only; email DNS is untouched) ---
# Takes effect once anotherrealmgroundworks.com is attached to this Netlify site
# as a domain alias and its WEBSITE DNS points here. Do NOT touch MX/SPF/DKIM/DMARC.
[[redirects]]
  from = "https://anotherrealmgroundworks.com/*"
  to = "https://archcitypropertycare.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.anotherrealmgroundworks.com/*"
  to = "https://archcitypropertycare.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
